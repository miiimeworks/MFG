; MIIIME File Generator Configuration
; ⓒ 2026 MIIIME

; 이 파일은 ANSI 인코딩으로 저장되어야 합니다.
; This file must be saved in ANSI encoding.

[General]

FileName=.gitkeep
; 생성/삭제할 파일의 이름 / Name of the file to create or delete

FileContent=This file allows empty folders to be committed to GitHub.
; 파일에 기록할 내용 (CREATE 모드에서만 사용) / Content written to the file (CREATE mode only)

OperationMode=CREATE
; 동작 모드 / Operation mode
; CREATE = 파일 생성 / Create files
; DELETE = 파일 삭제 / Delete files

TargetScope=2
; 탐색 범위 / Folder scan scope
; 1 = 모든 폴더 / All folders
; 2 = 최하위 폴더 (더 이상 하위 폴더 없음) / Leaf folders only

TargetState=2
; 생성 조건 (CREATE 모드에서만 사용) / Creation condition (CREATE mode only)
; 1 = 무조건 생성 / Always create
; 2 = 빈 폴더에만 생성 / Only when folder is empty

TargetFolder=
; 마지막으로 사용한 대상 폴더 / Last used target folder
; 비워두면 실행 파일 위치를 기본값으로 사용합니다.
; Leave empty to use the executable's directory as the default.

[Options]

Local=
; 언어 설정 / Language setting
; En = 영어 (기본값) / English (default)
; Kr = 한국어 / Korean  →  Loc\Kr.ini 필요 / Requires Loc\Kr.ini
